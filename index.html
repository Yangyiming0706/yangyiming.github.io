<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉诺塔 最终版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-wrap">
        <h1>汉诺塔游戏</h1>

        <div class="control-panel">
            <div class="diff">
                <span>难度：</span>
                <select id="diffSelect">
                    <option value="3">3层</option>
                    <option value="4" selected>4层</option>
                    <option value="5">5层</option>
                </select>
            </div>

            <div class="step-info">
                总步数：<span id="stepNum">0</span>
            </div>

            <div class="btn-group">
                <button id="resetBtn">重置</button>
                <button id="undoBtn">撤销</button>
                <button id="autoBtn">自动演示</button>
            </div>
        </div>

        <div class="win-text" id="winText"></div>

        <div class="game-box">
            <div class="pole" data-index="0"></div>
            <div class="pole" data-index="1"></div>
            <div class="pole" data-index="2"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
